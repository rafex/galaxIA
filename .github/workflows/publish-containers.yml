name: Publish container images to GHCR

# CD (entrega continua), no CI — ver spec-native/pipelines/CD.md.
# Fase 4 del plan de distribución (DEC-0060/0061/0062 fases 1-3): publica
# las 3 imágenes de contenedor del core (Atlas, Navigator, Portal-chat) a
# GitHub Container Registry, multi-arch (linux/amd64 + linux/arm64 — la
# topología real de este proyecto ya usa hardware ARM, ver
# docs/despliegue-multi-host.md y raspi4b-lan).
#
# A diferencia de publish-packages.yml (que publica en cada push a main),
# las imágenes de contenedor solo se cortan en un release explícito (tag
# v*) — construir y subir 3 imágenes multi-arch en cada commit saturaría
# GHCR sin necesidad; un release es la unidad natural de "esta es la
# versión que alguien va a desplegar".

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publicar (ej. v0.1.0-beta.1) — usa el commit actual si se deja vacío junto con :latest únicamente"
        type: string
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-containers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      matrix:
        include:
          - app: atlas
            containerfile: containers/atlas/Containerfile
          - app: navigator
            containerfile: containers/navigator/Containerfile
          - app: portal-chat
            containerfile: containers/portal-chat/Containerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determinar tags de la imagen
        id: tag
        run: |
          IMAGE="ghcr.io/rafex/galaxia-${{ matrix.app }}"
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=""
          fi

          {
            echo "value<<EOF"
            echo "$IMAGE:latest"
            if [ -n "$VERSION" ]; then
              echo "$IMAGE:$VERSION"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU (build multi-arch en runner amd64)
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.containerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          tags: ${{ steps.tag.outputs.value }}

name: CI

# Validación de Pull Requests — ver spec-native/pipelines/CI.md.
# No publica ni despliega nada (eso es CD, ver publish-packages.yml y
# jekyll-gh-pages.yml) — solo bloquea el merge si lint, typecheck, test o
# build fallan.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Compilar fhs-protocol
        # dist/ está gitignored y eslint (parserOptions.projectService) más
        # el resto de workspaces resuelven @rafex/galaxia-fhs-protocol contra
        # dist/ — sin este paso, lint también falla en un checkout limpio
        # (mismo motivo documentado en DEC-0042 para typecheck/build).
        run: npm run build -w packages/fhs-protocol
      - run: npm run lint --workspaces
      - run: npm run lint:scripts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Compilar fhs-protocol
        run: npm run build -w packages/fhs-protocol
      - run: npm run typecheck --workspaces

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependencias
        # `apps/portal-chat` corre vitest reutilizando vite.config.ts, que carga
        # el binario nativo de Rollup — mismo problema de DEC-0042 (el
        # lockfile, generado en macOS ARM, no trae la entrada
        # @rollup/rollup-linux-x64-gnu). Sin borrar+reinstalar aquí, este
        # job falla en el runner Linux con "Cannot find module
        # @rollup/rollup-linux-x64-gnu" al arrancar vitest para portal-chat.
        run: |
          rm -f package-lock.json
          npm install
      - run: npm run build -w packages/fhs-protocol
      - run: npm run test --workspaces

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        # No usa el package-lock.json commiteado: se genera en macOS (ARM),
        # así que solo pinea el binario nativo de Rollup para esa
        # plataforma (node_modules/@rollup/rollup-darwin-arm64) — no incluye
        # una entrada resuelta para @rollup/rollup-linux-x64-gnu, y `vite
        # build` (apps/portal-chat) en el runner (Linux x64) falla con "Cannot
        # find module @rollup/rollup-linux-x64-gnu" tanto con "npm ci" como
        # con "npm install" respetando ese lockfile. Confirmado inspeccionando
        # package-lock.json: solo existe la entrada darwin-arm64 en
        # "packages", ninguna para linux — no es el bug npm/cli#4828, es que
        # el lockfile nunca tuvo la entrada de Linux. Se borra el lockfile
        # y se resuelve fresco contra el registro, nativo para el runner
        # (ver spec-native/DECISIONS.md DEC-0042). Este job valida que el
        # código compile de punta a punta, no fija versiones exactas —
        # perder el pineo exacto aquí es aceptable.
        run: |
          rm -f package-lock.json
          npm install

      - name: Compilar fhs-protocol
        run: npm run build -w packages/fhs-protocol

      - name: Build (todos los workspaces)
        # No usa el script raíz "build" a propósito: ese solo compila
        # fhs-protocol + navigator + portal, se le olvidó apps/atlas cuando
        # se separó en DEC-0035. --workspaces sí cubre las 4 (ver
        # spec-native/DECISIONS.md DEC-0042).
        run: npm run build --workspaces

  e2e-smoke:
    # Regresión funcional real (SPEC-QUALITY-0001, DEC-0073) — todo lo de
    # arriba valida "compila" (lint/typecheck/build) y "las funciones puras
    # no rompen" (test), pero nada verificaba que el sistema siga
    # funcionando de punta a punta. Levanta Atlas + Navigator reales (mismo
    # patrón que la verificación manual del proyecto) y corre
    # scripts/e2e-smoke.ts: registro firmado (DEC-0069), welcome verificado,
    # visibility propagada, CallerAuth, y un chat.request/chat.completed
    # real. Encontró un bug real la primera vez que corrió (Navigator
    # crasheaba en silencio si `chat.completed.toolCalls` faltaba — ahora
    # corregido en llm-gateway.ts).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        # Mismo motivo que el job "build": el lockfile committeado (macOS
        # ARM) no trae el binario nativo de Rollup para linux-x64.
        run: |
          rm -f package-lock.json
          npm install

      - name: Build (protocolo, atlas, navigator)
        run: |
          npm run build -w packages/fhs-protocol
          npm run build -w apps/atlas
          npm run build -w apps/navigator

      - name: Levantar Atlas + Navigator y correr el smoke E2E
        run: |
          PORT=8081 HOST=127.0.0.1 MDNS_ENABLED=false \
            ATLAS_DB_PATH=/tmp/e2e-atlas.db IDENTITY_KEY_PATH=/tmp/e2e-atlas-id.pem \
            node apps/atlas/dist/index.js > /tmp/atlas.log 2>&1 &
          PORT=8090 HOST=127.0.0.1 ATLAS_URL=http://127.0.0.1:8081 \
            NAVIGATOR_IDENTITY_KEY_PATH=/tmp/e2e-nav-id.pem \
            node apps/navigator/dist/index.js > /tmp/navigator.log 2>&1 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8081/health >/dev/null && curl -sf http://127.0.0.1:8090/health >/dev/null && break
            sleep 1
          done
          ATLAS_URL=http://127.0.0.1:8081 NAVIGATOR_URL=http://127.0.0.1:8090 npx tsx scripts/e2e-smoke.ts

      - name: Logs de Atlas/Navigator (siempre, para diagnosticar fallos)
        if: always()
        run: |
          echo "::group::atlas.log"; cat /tmp/atlas.log || true; echo "::endgroup::"
          echo "::group::navigator.log"; cat /tmp/navigator.log || true; echo "::endgroup::"

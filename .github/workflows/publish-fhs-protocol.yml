name: Publish @rafex/galaxia-fhs-protocol to GitHub Packages

# CD (entrega continua), no CI — ver spec-native/pipelines/CD.md.
# Publica el SDK del protocolo (packages/fhs-protocol) a GitHub Packages en
# cada push a main que lo modifique.
#
# Automatización (DEC-0041, ver helpers/shell y helpers/python):
# - Si la versión en package.json ya está publicada, el propio workflow la
#   sube automáticamente (helpers/python/bump_protocol_version.py) y
#   commitea el bump de vuelta a main — ya no depende de que quien mergea
#   se acuerde de subir el número a mano.
# - Antes de publicar, verifica que el tarball incluya dist/ compilado
#   (helpers/shell/verify-protocol-package.sh) — la versión 0.1.0 se publicó
#   rota por esto exacto (ver DEC-0040), este chequeo evita que se repita.

on:
  push:
    branches: ["main"]
    paths:
      - "packages/fhs-protocol/**"
      - ".github/workflows/publish-fhs-protocol.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesario para poder pushear el commit de bump de vuelta a main.
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@rafex"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Instalar dependencias del workspace
        run: npm ci

      - name: Bump de versión si ya está publicada
        run: make protocol-bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitear el bump de versión (si hubo)
        run: |
          if ! git diff --quiet -- packages/fhs-protocol/package.json package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/fhs-protocol/package.json package-lock.json
            git commit -m "chore: bump @rafex/galaxia-fhs-protocol version [skip ci]"
            git push
          else
            echo "Sin cambios de versión — nada que commitear."
          fi

      - name: Verificar contenido del paquete (build + dist/ en el tarball)
        run: make protocol-verify

      - name: Publicar a GitHub Packages
        run: npm publish -w packages/fhs-protocol
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

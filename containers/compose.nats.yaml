# Overlay opcional para activar el puente de eventos Atlasâ†”Navigator vĂ­a
# NATS (SPEC-BRIDGE-0001, DEC-0074). No modifica containers/compose.yaml â€”
# se usa junto a Ă©l. Sin este overlay, el stack funciona exactamente igual
# que hoy: el chat nunca dependiĂ³ de esto (AgentRuntime resuelve el catĂ¡logo
# en vivo por REST en cada turno). Lo Ăºnico que gana el Portal con esto son
# notificaciones en vivo de altas/bajas de nodos, en vez de solo verlas en
# la siguiente consulta puntual a /api/fhs/providers.
#
# Uso:
#   podman-compose -f containers/compose.yaml -f containers/compose.nats.yaml up -d --build
#
# NATS core (pub/sub simple, sin JetStream) â€” suficiente porque esto nunca
# fue una dependencia funcional del pipeline de chat, solo una mejora de
# experiencia. Si Navigator se reinicia mientras NATS estĂ¡ activo, no hay
# replay de lo que se perdiĂ³ â€” el catĂ¡logo sigue siendo correcto porque cada
# turno de chat lo vuelve a resolver por REST, independientemente de NATS.

services:
  nats:
    image: nats:2.10-alpine
    container_name: fhs-nats
    networks:
      - fhs
    restart: unless-stopped

  atlas:
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats

  navigator:
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats

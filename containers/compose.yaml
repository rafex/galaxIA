# galaxIA — Docker Compose, pensado para desplegarse en dos máquinas distintas
# (ver docs/despliegue-multi-host.md):
#   - laptop: servicios "agent-server" + "web" (el core)
#   - bastion: servicios "llm-provider" + "ocr-provider" (los providers pesados)
#
# En un solo host (todo en el bastion, como antes), los defaults de
# PROVIDER_REGISTRY_URL/LLM_PROVIDER_HOST/OCR_PROVIDER_HOST siguen funcionando
# sin tocar nada — asumen Docker DNS dentro del mismo host. Para separar en
# dos máquinas, exportar esas variables (shell env, tiene precedencia sobre
# .env) con la IP real de la laptop antes de levantar llm-provider/ocr-provider
# (ver docs/despliegue-multi-host.md).
#
# Nota: se usa PROVIDER_REGISTRY_URL (no REGISTRY_URL) a propósito — el .env
# de este repo ya define REGISTRY_URL para desarrollo local sin contenedores
# (apunta a localhost); reutilizar ese mismo nombre aquí haría que
# podman-compose lo cargara automáticamente y rompiera el default de un
# solo host.

services:
  agent-server:
    build:
      context: ..
      dockerfile: containers/agent-server/Containerfile
    container_name: fhs-agent-server
    ports:
      - "30083:8081"
    environment:
      - PORT=8081
      - HOST=0.0.0.0
    networks:
      - fhs
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: containers/web/Containerfile
    container_name: fhs-web
    ports:
      - "3000:80"
    depends_on:
      - agent-server
    networks:
      - fhs
    restart: unless-stopped

  llm-provider:
    build:
      context: ..
      dockerfile: containers/llm-provider/Containerfile
    container_name: fhs-llm-provider
    # Sin remapeo a propósito: el manifiesto que este provider anuncia usa
    # LLM_PROVIDER_PORT (43111) tanto para escuchar como para el endpoint
    # publicado — si el puerto externo fuera distinto (ej. 30084:43111),
    # un agent-server en otra máquina intentaría conectarse al puerto
    # equivocado. En un solo host esto no importaba (Docker DNS iba directo
    # al puerto interno, sin pasar por el mapeo de host); entre dos hosts sí.
    ports:
      - "43111:43111"
    environment:
      - LLM_PROVIDER_PORT=43111
      # Hostname que este provider anuncia en su manifiesto — debe ser
      # alcanzable por el agent-server (Registry). En un solo host, el nombre
      # de servicio Docker basta; separado en otra máquina, usar su IP LAN.
      - LLM_PROVIDER_HOST=${LLM_PROVIDER_HOST:-llm-provider}
      # A dónde se conecta este provider a registrarse. En un solo host,
      # Docker DNS del agent-server local; separado, la IP LAN de la laptop.
      - REGISTRY_URL=${PROVIDER_REGISTRY_URL:-ws://agent-server:8081/fhs/v1/ws}
      - LLAMA_CPP_URL=http://host.containers.internal:8080/v1
      - PROVIDER_ID=did:key:macmini-raul
      - PROVIDER_NAME=Mac mini de Raul
      - MODEL_ID=qwen2.5-coder-3b-instruct
      - MODEL_DISPLAY_NAME=Qwen 2.5 Coder 3B Instruct
      - MODEL_CONTEXT_WINDOW=4096
      - MODEL_TOOL_CALLING_SUPPORTED=true
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - fhs
    restart: unless-stopped

  ocr-provider:
    build:
      context: ..
      dockerfile: containers/ocr-provider/Containerfile
    container_name: fhs-ocr-provider
    # Sin remapeo — mismo motivo que llm-provider (ver arriba).
    ports:
      - "43112:43112"
    environment:
      - OCR_PROVIDER_PORT=43112
      - OCR_PROVIDER_HOST=${OCR_PROVIDER_HOST:-ocr-provider}
      - REGISTRY_URL=${PROVIDER_REGISTRY_URL:-ws://agent-server:8081/fhs/v1/ws}
      - OCR_SERVICE_URL=http://ether-ocr-api:8000
      - OCR_API_KEY=dev-key-ether-ocr
      - PROVIDER_ID=did:key:ocr-provider-01
      - PROVIDER_NAME=OCR FHS Provider
    networks:
      - fhs
    restart: unless-stopped

networks:
  fhs:
    name: fhs
    driver: bridge

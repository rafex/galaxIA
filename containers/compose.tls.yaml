# Overlay opcional para activar TLS/HTTPS con certificado autofirmado en
# toda la comunicaciÃ³n FHS (navegadorâ†”web, webâ†”agent-server, agent-serverâ†”
# providers). No modifica containers/compose.yaml â€” se usa junto a Ã©l.
#
# Requiere generar el certificado antes (una vez por mÃ¡quina, o copiar el
# mismo par a laptop y bastion):
#   helpers/scripts/shell/generate-dev-cert.sh <ip-laptop> <ip-bastion>
#
# Uso:
#   podman-compose -f containers/compose.yaml -f containers/compose.tls.yaml up -d --build
#
# Ver docs/tls-autofirmado.md para el detalle completo, incluyendo quÃ©
# variables ajustar en cada mÃ¡quina de la topologÃ­a multi-host.
#
# CERTS_DIR: ruta absoluta a la carpeta con dev.crt/dev.key, EN EL HOST QUE
# REALMENTE EJECUTA EL CONTENEDOR â€” no en la mÃ¡quina desde la que se corre
# `podman-compose`. Si se administra el bastion vÃ­a conexiÃ³n remota de podman
# (sin un checkout del repo ahÃ­), la ruta relativa por defecto (../certs) no
# existe en ese host y el bind-mount falla. Copiar los certs al bastion
# (ej. scp a ~/certs) y exportar CERTS_DIR=/home/<usuario>/certs antes de
# levantar los servicios que corren ahÃ­.

services:
  agent-server:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

  web:
    # 8443, no 443: podman rootless no puede exponer puertos privilegiados
    # (<1024) sin ajustar net.ipv4.ip_unprivileged_port_start o correr con
    # sudo. 8443 ademÃ¡s ya estÃ¡ en la whitelist de UFW del bastion como
    # "Apps" en despliegues previos de este proyecto.
    ports:
      - "8443:443"
    volumes:
      - ${CERTS_DIR:-../certs}:/etc/nginx/certs:ro
      - ./web/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro

  llm-provider:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

  ocr-provider:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

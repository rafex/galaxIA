# Overlay opcional para activar TLS/HTTPS con certificado autofirmado en
# toda la comunicación FHS (navegador↔portal, portal↔navigator, navigator↔
# providers). No modifica containers/compose.yaml — se usa junto a él.
#
# Nota (DEC-0035): el link HTTP Navigator→Atlas (ATLAS_URL) NO está cubierto
# por este overlay todavía — AtlasClient usa `fetch` nativo sin override de
# confianza para certificados autofirmados (a diferencia de las conexiones
# WebSocket del resto del stack, que sí usan `rejectUnauthorized: false`
# explícito). Con TLS activo, `ATLAS_URL=https://atlas:8081` fallaría por
# certificado no confiable. Queda documentado como pendiente, no resuelto.
#
# Requiere generar el certificado antes (una vez por máquina, o copiar el
# mismo par a laptop y bastion):
#   helpers/scripts/shell/generate-dev-cert.sh <ip-laptop> <ip-bastion>
#
# Uso:
#   podman-compose -f containers/compose.yaml -f containers/compose.tls.yaml up -d --build
#
# Ver docs/tls-autofirmado.md para el detalle completo, incluyendo qué
# variables ajustar en cada máquina de la topología multi-host.
#
# CERTS_DIR: ruta absoluta a la carpeta con dev.crt/dev.key, EN EL HOST QUE
# REALMENTE EJECUTA EL CONTENEDOR — no en la máquina desde la que se corre
# `podman-compose`. Si se administra el bastion vía conexión remota de podman
# (sin un checkout del repo ahí), la ruta relativa por defecto (../certs) no
# existe en ese host y el bind-mount falla. Copiar los certs al bastion
# (ej. scp a ~/certs) y exportar CERTS_DIR=/home/<usuario>/certs antes de
# levantar los servicios que corren ahí.

services:
  atlas:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

  navigator:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
      # Ver nota arriba: esto es lo "correcto" en intención, pero falla hoy
      # porque AtlasClient no confía en certificados autofirmados todavía.
      - ATLAS_URL=https://atlas:8081
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

  portal:
    # 8443, no 443: podman rootless no puede exponer puertos privilegiados
    # (<1024) sin ajustar net.ipv4.ip_unprivileged_port_start o correr con
    # sudo. 8443 además ya está en la whitelist de UFW del bastion como
    # "Apps" en despliegues previos de este proyecto.
    ports:
      - "8443:443"
    volumes:
      - ${CERTS_DIR:-../certs}:/etc/nginx/certs:ro
      - ./portal/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro

  star:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

  satellite-ocr:
    environment:
      - TLS_CERT_PATH=/certs/dev.crt
      - TLS_KEY_PATH=/certs/dev.key
    volumes:
      - ${CERTS_DIR:-../certs}:/certs:ro

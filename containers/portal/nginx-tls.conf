# Variante TLS de nginx.conf — solo para la PoC (certificado autofirmado).
# Ver docs/tls-autofirmado.md para cómo activarla. No sustituye a nginx.conf
# automáticamente: hay que copiarla explícitamente o montarla por volumen.

server {
    listen 80;
    server_name localhost;
    # Redirige todo el tráfico plano a HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # DEC-0035: Atlas y Navigator son servicios separados — ver nginx.conf.
    location /api/fhs {
        proxy_pass https://atlas:8081;
        # Autofirmado: no hay CA que verificar. No usar en producción.
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fhs/v1/ws {
        proxy_pass https://atlas:8081;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/chat/ws {
        proxy_pass https://navigator:8090;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /api {
        proxy_pass https://navigator:8090;
        # Autofirmado: no hay CA que verificar. No usar en producción.
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }
}

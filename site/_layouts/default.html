<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">galaxIA</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Inicio</a>
        <a href="{{ '/protocolo/' | relative_url }}">Protocolo</a>
        <a href="{{ '/integrar/' | relative_url }}">Integrar</a>
        <a href="{{ '/docs/' | relative_url }}">Documentación</a>
        <a href="{{ '/pendientes/' | relative_url }}">Pendientes</a>
        <a href="https://github.com/{{ site.repository }}">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>galaxIA — Sin nube, suscripciones ni dueño. Licencia MIT.</p>
    </div>
  </footer>

  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    document.querySelectorAll("pre > code.language-mermaid").forEach((block) => {
      const container = document.createElement("div");
      container.className = "mermaid";
      container.textContent = block.textContent;
      block.parentElement.replaceWith(container);
    });
    mermaid.initialize({ startOnLoad: true, theme: "dark" });
  </script>
</body>
</html>
